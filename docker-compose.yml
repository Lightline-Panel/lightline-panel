services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lightline
      POSTGRES_USER: lightline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightline"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: lightline-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://lightline:${POSTGRES_PASSWORD:-changeme}@postgres:5432/lightline
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,https://${PANEL_DOMAIN:-localhost}}
      REDIS_URL: redis://redis:6379/0
      SERVER_IP: ${SERVER_IP:-127.0.0.1}
      SS_PORT: ${SS_PORT:-8388}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - panelcerts:/var/lib/lightline/certs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PANEL_DOMAIN: ${PANEL_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount certbot SSL certs for HTTPS (like Marzban)
      # 1. Run: certbot certonly --standalone -d YOUR_DOMAIN
      # 2. Set PANEL_DOMAIN=YOUR_DOMAIN in .env
      # Mounts entire /etc/letsencrypt because live/ contains symlinks to archive/
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
  redisdata:
  panelcerts:
